name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist is a Vite production build
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo 'dist/index.html still references dev entry; build misconfigured.'
            exit 1
          fi
          if ! grep -q '/ITSS4330Final/assets/' dist/index.html; then
            echo 'dist/index.html missing /ITSS4330Final/assets/ script URL.'
            cat dist/index.html
            exit 1
          fi
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
